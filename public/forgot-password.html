<!DOCTYPE html><html>
<head>
<title>Forgot Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1"><style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#0b0e11,#121826);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:95%;
max-width:400px;
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:20px;
}

input,button{
width:100%;
padding:14px;
margin-top:12px;
border-radius:10px;
border:none;
}

button{
background:linear-gradient(45deg,#f3ba2f,#ffcc4d);
}

</style></head><body><div class="container"><h2>Reset Password</h2><input id="email" placeholder="Enter your email"><button onclick="sendCode()">Send Reset Code</button>

</div><script>

async function sendCode(){

let email = document.getElementById("email").value

let res = await fetch("/forgot-password",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email})
})

let data = await res.json()

alert(data.message)

if(data.status==="success"){

localStorage.setItem("resetEmail",email)

window.location.href="verify-reset-code.html"

}

}

</script></body>
</html>
