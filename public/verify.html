        
<!DOCTYPE html><html lang="en">
<head><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Verify Account</title><style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#0b0e11,#121826);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:50vh;
}                

.container{
width:95%;
max-width:400px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:25px;
border-radius:20px;
text-align:center;
}

h2{
color:#f3ba2f;
}

input{
width:100%;
padding:14px;
margin:15px 0;
border:none;
border-radius:10px;
font-size:16px;
text-align:center;
letter-spacing:5px;
}

button{
="width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:17px;
cursor:pointer;
margin-top:15px;
background:linear-gradient(45deg,#1e90ff,#4da3ff);
color:white;
}

.resend{
margin-top:20px;
background:none;
color:#f3ba2f;
border:none;
cursor:pointer;
}

</style></head>

<body>

<div class="container">

<h2>Verify Your Account</h2>
<p>Enter 6-digit verification code sent to your email</p>


<input id="code" maxlength="6" placeholder="******">

<button onclick="verifyCode()">
Verify
</button>

<button id="resendBtn" class="resend" onclick="resendCode()">
Resend Code
</button>

</div>

<script>

async function verifyCode(){

let code = document.getElementById("code").value.trim()
let email = localStorage.getItem("verifyEmail")

/* SESSION CHECK */
if(!email){

alert("Verification session expired. A new code sent check your email.")
return await resendVerification()
}

/* CODE VALIDATION */
if(code.length !== 6){
alert("Enter 6 digit verification code")
return
}

try{

let res = await fetch("/verify",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
code
})
})

let data = await res.json()

alert(data.message || "Verification completed")

if(data.status === "success"){

localStorage.removeItem("verifyEmail")
window.location.href="dashboard.html"

}

}catch(err){

console.log(err)
alert("Verification failed. Try again later.")

}

}


/* RESEND CODE FUNCTION */

async function resendVerification(){

let email = localStorage.getItem("verifyEmail")

if(!email){
alert("Session expired. Please register again.")
window.location.href="register.html"
return
}

try{

await fetch("/resend-verification-code",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email})
})

alert("New verification code sent. Please check your email.")

startResendTimer()

}catch(err){

console.log(err)
alert("Failed to resend verification code")

}

}


/* TIMER SYSTEM */

let resendTimer = 30
let timerInterval

function startResendTimer(){

let btn = document.querySelector(".resend")

if(!btn) return

btn.disabled = true
resendTimer = 30

clearInterval(timerInterval)

timerInterval = setInterval(()=>{

resendTimer--

btn.innerText = "Resend Code ("+resendTimer+")"

if(resendTimer <= 0){

clearInterval(timerInterval)

btn.disabled = false
btn.innerText = "Resend Code"

}

},1000)

}


/* START TIMER ON PAGE LOAD */

window.onload = startResendTimer


</script></body>
</html>
