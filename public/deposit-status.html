<!DOCTYPE html>
<html>

<head>
<title>Deposit Status</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f2027;
color:white;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.statusBox{
background:rgba(255,255,255,0.1);
padding:18px;
border-radius:14px;
margin-top:18px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
width:100%;
cursor:pointer;
margin-top:12px;
font-weight:bold;
}

.warning{
background:#ffcc00;
color:black;
padding:15px;
border-radius:12px;
margin-top:20px;
font-size:14px;
}

h2{
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>Deposit Status</h2>

<div id="statusList"></div>

<div class="warning">
⚠️ If your deposit is not approved within 30 minutes, please contact admin support.
</div>

<div style="margin-top:20px">

<button onclick="makeDeposit()">Make Another Deposit</button>
<button onclick="goDashboard()">Go Dashboard</button>

<a href="https://wa.me/254XXXXXXXXX" target="_blank">
<button>Contact Admin on WhatsApp</button>
</a>

</div>

</div>

<script>

/* Load Deposit Status */

async function loadDepositStatus(){

let email = localStorage.getItem("sessionEmail")

if(!email){
alert("Session expired")
window.location.href="login.html"
return
}

let res = await fetch(`/deposit-status?email=${email}`)

let deposits = await res.json()

let container = document.getElementById("statusList")

container.innerHTML = ""

deposits.forEach(d=>{

let whatsappButton = ""

if(d.status === "rejected"){
whatsappButton = `
<a href="https://wa.me/254XXXXXXXXX" target="_blank">
<button>Contact Support</button>
</a>
`
}

container.innerHTML += `
<div class="statusBox">

<p><b>Amount:</b> ${d.amount}</p>
<p><b>Status:</b> ${d.status}</p>

<p style="font-size:13px;opacity:0.9">
⏳ If not approved within 30 minutes, contact admin.
</p>

${whatsappButton}

</div>
`

})

}

/* Navigation Buttons */

function makeDeposit(){
window.location.href="deposit.html"
}

function goDashboard(){
window.location.href="dashboard.html"
}

/* Auto Load */

loadDepositStatus()

</script>

</body>
</html>
